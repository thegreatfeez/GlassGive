services:
  - type: keyvalue
    name: glassgive-cache
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: glassgive-backend
    runtime: node
    plan: starter
    region: oregon
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: glassgive-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: glassgive-cache
          property: connectionString
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SIG_THRESHOLD
        value: 2
      - key: MIRROR_NODE_URL
        value: https://testnet.mirrornode.hedera.com
      - key: MIRROR_POLL_INTERVAL
        value: 60000
      - key: MAGIC_SECRET_KEY
        sync: false
      - key: HEDERA_OPERATOR_ID
        sync: false
      - key: HEDERA_OPERATOR_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: NFT_TOKEN_ID
        sync: false
      - key: FACTORY_CONTRACT_ID
        sync: false
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: glassgive-db
    plan: starter
